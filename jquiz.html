<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 최신 트렌드 세터 능력고사</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Gmarket+Sans:wght@500;700&family=Pretendard:wght@400;600;700&display=swap');

        :root {
            --bg-color: #f0f3f8;
            --container-bg: #ffffff;
            --primary-color: #ff4757;
            --primary-hover: #ff6b81;
            --text-main: #2f3542;
            --text-sub: #747d8c;
            --correct-color: #2ed573;
            --incorrect-color: #ff4757;
            --border-color: #ced6e0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .quiz-container {
            background-color: var(--container-bg);
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 650px;
            padding: 40px;
            text-align: center;
        }

        .start-screen, .result-screen { display: block; }
        .game-screen { display: none; }

        h1 {
            font-family: 'Gmarket Sans', sans-serif;
            font-weight: 700;
            font-size: 2.2rem;
            color: var(--primary-color);
            margin-bottom: 15px;
            word-break: keep-all;
        }

        .subtitle {
            font-size: 1.1rem;
            color: var(--text-sub);
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 16px 40px;
            font-size: 1.25rem;
            font-weight: 600;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 6px 20px rgba(255, 71, 87, 0.3);
            font-family: 'Pretendard', sans-serif;
        }

        .btn:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
        }

        .progress-bar-container {
            width: 100%;
            height: 10px;
            background-color: #e4e7eb;
            border-radius: 5px;
            margin-bottom: 25px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background-color: var(--primary-color);
            transition: width 0.3s ease;
        }

        .status-text {
            font-size: 1rem;
            color: var(--text-sub);
            font-weight: 700;
            margin-bottom: 12px;
            text-align: left;
        }

        .question-text {
            font-size: 1.4rem;
            font-weight: 700;
            line-height: 1.5;
            margin-bottom: 30px;
            text-align: left;
            word-break: keep-all;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-bottom: 30px;
        }

        .option-btn {
            background-color: #f1f2f6;
            border: 2px solid transparent;
            border-radius: 14px;
            padding: 18px 22px;
            font-size: 1.1rem;
            font-weight: 600;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
            color: var(--text-main);
            font-family: 'Pretendard', sans-serif;
        }

        .option-btn:hover:not([disabled]) {
            background-color: #e4e7eb;
        }

        .option-btn.correct {
            background-color: #e8f8f5;
            border-color: var(--correct-color);
            color: var(--correct-color);
        }

        .option-btn.incorrect {
            background-color: #fceae9;
            border-color: var(--incorrect-color);
            color: var(--incorrect-color);
        }

        .feedback-container {
            display: none;
            background-color: #f8f9fa;
            border-radius: 14px;
            padding: 22px;
            margin-bottom: 30px;
            text-align: left;
            border-left: 6px solid var(--primary-color);
        }

        .feedback-title { font-weight: 700; font-size: 1.15rem; margin-bottom: 8px; }
        .feedback-title.correct-text { color: var(--correct-color); }
        .feedback-title.incorrect-text { color: var(--incorrect-color); }
        .feedback-desc { font-size: 1rem; color: var(--text-sub); line-height: 1.5; }

        .next-btn { display: none; width: 100%; }
        .result-title { font-family: 'Gmarket Sans', sans-serif; font-size: 1.9rem; margin-bottom: 15px; }
        .result-score { font-size: 3.8rem; font-weight: 700; color: var(--primary-color); margin-bottom: 20px; }
        .result-rank { font-size: 1.35rem; font-weight: 700; background-color: #f1f2f6; display: inline-block; padding: 12px 30px; border-radius: 25px; margin-bottom: 25px; }
        .result-desc { font-size: 1.1rem; color: var(--text-sub); line-height: 1.6; margin-bottom: 35px; word-break: keep-all; }
        .badge-img { font-size: 5rem; margin-bottom: 15px; animation: bounce 1s infinite alternate; }
        @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-10px); } }
    </style>
</head>
<body>

    <div class="quiz-container">
        <!-- 1. 시작 화면 -->
        <div id="start-screen" class="start-screen">
            <div class="badge-img">👑</div>
            <h1>2026 궁극의 트렌드 세터 고사</h1>
            <p class="subtitle">"허제니 신조어 고사</p>
            <button class="btn" onclick="startGame()">트렌드 검증 시작</button>
        </div>

        <!-- 2. 게임 화면 -->
        <div id="game-screen" class="game-screen">
            <div class="status-text" id="status-text">문제 1 / 20</div>
            <div class="progress-bar-container">
                <div class="progress-bar" id="progress-bar"></div>
            </div>
            
            <div class="question-text" id="question-text">질문</div>
            
            <div class="options-container" id="options-container"></div>

            <div class="feedback-container" id="feedback-container">
                <div class="feedback-title" id="feedback-title">결과</div>
                <div class="feedback-desc" id="feedback-desc">해설</div>
            </div>

            <button class="btn next-btn" id="next-btn" onclick="nextQuestion()">다음 문제 고! ▶</button>
        </div>

        <!-- 3. 결과 화면 -->
        <div id="result-screen" class="result-screen" style="display: none;">
            <div class="badge-img" id="result-emoji">💫</div>
            <div class="result-title">당신의 최종 트렌드 지수</div>
            <div class="result-score" id="result-score">0점</div>
            <div class="result-rank" id="result-rank">등급</div>
            <p class="result-desc" id="result-desc">분석</p>
            <button class="btn" onclick="restartGame()">자존심 회복하러 가기</button>
        </div>
    </div>

    <script>
        const quizData = [
            {
                q: "2026년 인스타 릴스에서 시작되어 대유행 중인 밈으로, 우당탕탕 난리가 나거나 황당한 상황을 시트콤처럼 우아하게 승화시키는 이 마법의 단어는?",
                a: ["난리블루스", "난리자베스", "난리부르주아", "난리안성재"],
                cor: 1,
                desc: "원작자가 '2026년 유행어 배포합니다'라며 뻔뻔하게 선포해 대박이 난 밈입니다! 일이 꼬여도 '아~ 오늘 상황 완전 난리자베스~'라고 외치며 쿨하게 털어버릴 때 씁니다. 응용형으로 '집가자베스', '배고파자베스' 등이 있습니다."
            },
            {
                q: "2026년 최신 밈으로, 직장인 커뮤니티에서 '사무실에서 하품하다 성대가 완전히 열려 성악가 소리가 났다'는 썰에서 유래되어 깜짝 놀라거나 입이 떡 벌어지는 상황에 쓰는 감탄사는?",
                a: ["라을라~~~~", "하아아품~~~~", "오솔레미오~~~~", "에헤라디야~~~~"],
                cor: 0,
                desc: "하품하다가 성대가 열려 '라을라~~~' 소리가 났다는 당황스러운 실화가 숏폼 더빙 등으로 퍼지며, 기분이 너무 좋거나 황당하게 입을 벌리는 순간 지르는 대표 감탄사 밈이 되었습니다."
            },
            {
                q: "2026년 신조어로, 매사에 날이 서 있고 배배 꼬여서 사사건건 시비를 거는 '프로불편러'를 칭하는 기막힌 라면 종류는?",
                a: ["꼬들면", "스낵면", "너구리", "퍼진면"],
                cor: 0,
                desc: "성격이 '꼬들면'처럼 배배 꼬여있는 사람에게 '너 오늘 왜 이렇게 성격이 꼬들면이냐? 좀 푹 끓여져라(둥글게 좀 살아라)'라며 팩폭을 날릴 때 쓰는 트렌디한 표현입니다."
            },
            {
                q: "2026년 최신 숏폼 음원 가사에서 유래되어, 무언가 과하게 매혹적이거나 경고등이 켜질 만큼 위험하고 강렬한 상황에 붙이는 영어 표현은?",
                a: ["That's red red", "That's blue blue", "It's green green", "Oh my god god"],
                cor: 0,
                desc: "신곡 가사 중 'That's red red' 표현이 중독성을 타고 확산되면서, 치명적이거나 위험한 이벤트를 경고할 때 댓글창을 도배하는 2026 대세 밈입니다."
            },
            {
                q: "2026년 최신 드립으로, 단체 카톡방이나 댓글창에서 누군가 갑자기 선비 짓을 하거나 TMI 진지충 모드로 찬물을 끼얹을 때 날리는 단호한 한마디는?",
                a: ["혹시 T발 C야?", "어쩔티비 저쩔티비", "웅앵웅 초키포키", "선비님 공자맹자 하십니다"],
                cor: 0,
                desc: "공감 능력이 전무하고 이성적인 척 팩폭을 날리는 MBTI 'T'의 특성을 극대화하여 킹받게 차단하는 2026년형 유행 경고어입니다."
            },
            {
                q: "2026년 최신 은어로, 열심히 일이나 공부는 안 하고 침대에 누워 영혼 없이 도파민 가득한 숏폼 영상만 밤새 돌려보는 현대인을 비유하는 말은?",
                a: ["도파민 좀비", "알고리즘 노예", "쇼츠 중독자", "릴스 전사"],
                cor: 0,
                desc: "생산적인 활동은 올스톱한 채 오직 다음 숏폼 영상을 넘기는 손가락만 살아 움직이는 현대인들의 웃픈 모습을 '도파민 좀비'라고 부릅니다."
            },
            {
                q: "2026년 최신 유행어로, 기분 나쁜 억까나 잔소리를 들었을 때 '네 말은 하나도 안 들리고 그저 값비싸고 번지르르한 소리네~'라며 완벽하게 티배깅(놀림)하는 반박어는?",
                a: ["응~ 니 말이 다 마장동 한우 세트야~", "응~ 반사~", "어쩌라고베스", "니 말이 다 팩트체크 완료야~"],
                cor: 0,
                desc: "상대방의 훈수나 시비를 은은하게 웃는 표정으로 무력화시키는 최신 도발 치트키입니다. 마장동 한우 세트처럼 아주 '귀한 소리' 잘 들었다는 비꼬기 판정승 드립입니다."
            },
            {
                q: "흑백요리사 안성재 셰프가 남긴 유행어로, 무언가 기준에 딱 맞지 않거나 완성도가 미흡할 때 미간을 찌푸리며 쓰는 마법의 단어는?",
                a: ["이븐(Even)하게", "라이트(Light)하게", "나이스(Nice)하게", "터프(Tough)하게"],
                cor: 0,
                desc: "\"고기가 이븐하게 익지 않았어요.\"라는 심사평은 현재 라면 물 조절 실패부터 회사 보고서 퀄리티 미흡까지 모든 일상 영역에서 탈락을 외칠 때 쓰입니다."
            },
            {
                q: "한 외국인의 서툰 한국어 발음 '너무 예쁘네요'를 편의점 알바생이 창조적으로 오해해서 탄생한, 요즘 대세 금융 플러팅 밈은?",
                a: ["농협은행", "기업은행", "국민은행", "우리은행"],
                cor: 0,
                desc: "외국인의 발음을 '농협은행' 위치를 묻는 걸로 착각해 철벽을 친 일화에서 유래했습니다. 요즘은 맘에 들면 '농협은행(너무 예쁘네요)', '기업은행(귀엽네요)'이라고 플러팅합니다."
            },
            {
                q: "아이브 장원영이 보여준 초긍정 사고방식인 '원영적 사고'의 핵심 시그니처 감탄사이자 주문은?",
                a: ["완전 럭키비키잖아~🍀", "오히려 좋아!", "가보자고!", "폼 미쳤다"],
                cor: 0,
                desc: "빵이 눈앞에서 품절되어도 '덕분에 갓 구운 새 빵을 먹게 되다니 완전 럭키비키잖아!'라며 불운을 행운으로 강제 개조하는 전 국민 멘탈 치유 밈입니다."
            },
            {
                q: "한강이 얼어붙은 한겨울 뉴스 리포트에서 유래되어, 수많은 아이돌들이 뚝딱거리며 추는 챌린지로 대히트를 친 문장은?",
                a: ["꽁꽁 얼어붙은 한강 위로 고양이가 걸어다닙니다", "추운 겨울 한강 고양이가 식빵을 굽습니다", "얼음판 위 고양이가 미끄러집니다", "얼죽고(얼어 죽어도 고양이)입니다"],
                cor: 0,
                desc: "실제 뉴스 기자의 진지한 리포팅 음원에 중독성 있는 비트를 입혀 고양이 모션 댄스로 승화시킨 레전드 챌린지 밈입니다."
            },
            {
                q: "초등학생 서이브가 발표해 '선배! 마라탕 사주세요!'라는 가사와 손가락을 튕기는 안무로 전국을 뒤흔든 챌린지 곡 이름은?",
                a: ["마라탕후루", "마라샹궈", "탕후루후루", "마라탕웨이"],
                cor: 0,
                desc: "\"탕탕 후루후루~ 탕탕탕 후루루루루~\"라는 수능 금지곡 급 중독성으로 전 세대 아이돌과 초등학생들을 점령한 메가 히트 밈입니다."
            },
            {
                q: "무언가 과하게 멋지거나 압도적인 퍼포먼스를 보였을 때, 스포츠 선수에게 쓰던 말을 가져와 'OO 미쳤다'라고 극찬하는 단어는?",
                a: ["폼", "결", "값", "깡"],
                cor: 0,
                desc: "'폼(Form) 미쳤다'는 이제 유행어를 넘어 완벽한 실력이나 훌륭한 결과물을 칭찬할 때 일상적으로 쓰는 대세 표준어 급 단어가 되었습니다."
            },
            {
                q: "상대방이 너무 어처구니없고 황당하게 도를 넘는 행동을 할 때, 화가 나면서도 유쾌하게 분노를 표현하는 킹왕짱의 진화형 단어는?",
                a: ["킹받네", "갓받네", "핵받네", "뇌절이네"],
                cor: 0,
                desc: "침착맨이 유행시킨 '킹받네'는 '킹(King)+열받네'의 합성어로, 일상 속 자잘한 빡침과 어이없음을 가장 잘 표현해 장기 집권 중인 유행어입니다."
            },
            {
                q: "2025~2026년에 가장 자주 쓰이는 신조어로, '자신이 닮고 싶어 하거나 지향하는 시각적 분위기, 스타일, 아이덴티티'를 뜻하는 세 글자는?",
                a: ["추구미", "지향미", "이상향", "추구형"],
                cor: 0,
                desc: "'내가 추구하는 미(美)'의 줄임말로, '내 오늘 패션 추구미는 힙합이야' 처럼 자신의 취향이나 정체성을 힙하게 나타낼 때 씁니다."
            },
            {
                q: "어떤 상황이 내 예상과 완전히 다르게 흘러가 억울하거나, 기가 막혀 실소만 나올 때 먼 산을 보며 나지막이 읊조리는 국룰 대사는?",
                a: ["이게 맞나", "어라라?", "이게 무슨 일이고", "당황스럽네"],
                cor: 0,
                desc: "막장 현실이나 황당한 실패를 직면했을 때, 영혼이 가출한 표정으로 '하... 진짜 이게 맞나...'라고 독백하는 밈입니다."
            },
            {
                q: "커뮤니티 등에서 누군가가 어그로를 끌거나 말도 안 되는 억지 논리를 펼칠 때, 대꾸할 가치도 없다는 듯 단호하고 귀엽게 무시하는 표현은?",
                a: ["웅앵웅", "시러요", "반사", "맴맴"],
                cor: 0,
                desc: "상대방의 헛소리를 '웅앵웅 초키포키' 등으로 뭉뚱그려 들으며 상대를 무맥락으로 허탈하게 만드는 거절 치트키입니다."
            },
            {
                q: "과거 유행어인 '안습(안구에 습기)'의 계보를 잇는 2026년 대세 텍스트 유행어로, 너무 슬프거나 감동적이어서 눈물이 쏟아질 때 쓰는 표현은?",
                a: ["눈물 광광", "눈물 줄줄", "눈물 오열", "눈물 좔좔"],
                cor: 0,
                desc: "'감동받아서 눈물 광광 우럭따' 등으로 쓰이며, 주접을 떨거나 귀여운 슬픔을 표현할 때 빼놓을 수 없는 커뮤니티 국룰 텍스트입니다."
            },
            {
                q: "누군가 잘 알지도 못하면서 훈수를 두거나, 혼자 아는 척 TMI를 남발할 때 '오~ 너 혹시 OO 백과사전이야?'라며 비꼬며 쓰는 고서의 이름은?",
                a: ["동의보감", "조선왕조실록", "삼국유사", "훈민정음"],
                cor: 0,
                desc: "2026년형 은근한 티배깅 밈으로, 영혼 없는 리액션과 함께 '와~ 네 말이 다 동의보감이다~'라고 맞장구쳐서 상대를 민망하게 만들 때 씁니다."
            },
            {
                q: "마지막 문제! 이 치열한 2026 트렌드 고사를 끝마친 당신이 가져야 할 가장 '난리자베스'하고 트렌디한 엔딩 태도는?",
                a: ["틀린 문제 복습하며 싹 외우기", "점수가 낮아도 '트렌드를 새로 배웠으니 완전 럭키비키에 신났자베스~' 외치기 🍀", "출제자 찾아내서 성대 개방시키기", "도파민 좀비가 되어 다시 쇼츠 보러 가기"],
                cor: 1,
                desc: "정답은 당연히 2번! 트렌드 세터는 결과에 연연하지 않고 '럭키비키'와 '난리자베스'를 섞어 쓰며 우아하게 퇴장하는 법입니다. 고생하셨습니다!"
            }
        ];

        let currentIdx = 0;
        let score = 0;

        function startGame() {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
            showQuestion();
        }

        function showQuestion() {
            const data = quizData[currentIdx];
            document.getElementById('status-text').innerText = `문제 ${currentIdx + 1} / ${quizData.length}`;
            document.getElementById('progress-bar').style.width = `${((currentIdx + 1) / quizData.length) * 100}%`;
            document.getElementById('question-text').innerText = data.q;
            
            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';
            
            data.a.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = `${idx + 1}. ${opt}`;
                btn.onclick = () => checkAnswer(idx);
                optionsContainer.appendChild(btn);
            });
            
            document.getElementById('feedback-container').style.display = 'none';
            document.getElementById('next-btn').style.display = 'none';
        }

        function checkAnswer(selectedIdx) {
            const data = quizData[currentIdx];
            const options = document.querySelectorAll('.option-btn');
            options.forEach(btn => btn.disabled = true);
            
            const feedbackContainer = document.getElementById('feedback-container');
            const feedbackTitle = document.getElementById('feedback-title');
            const feedbackDesc = document.getElementById('feedback-desc');
            
            if (selectedIdx === data.cor) {
                options[selectedIdx].classList.add('correct');
                feedbackTitle.innerText = "🎉 정답자베스! 완전 폼 미쳤다!";
                feedbackTitle.className = "feedback-title correct-text";
                score += 5;
            } else {
                options[selectedIdx].classList.add('incorrect');
                options[data.cor].classList.add('correct');
                feedbackTitle.innerText = "💥 틀렸습니다! 상황 완전 난리자베스...";
                feedbackTitle.className = "feedback-title incorrect-text";
            }
            
            feedbackDesc.innerText = data.desc;
            feedbackContainer.style.display = 'block';
            document.getElementById('next-btn').style.display = 'block';
        }

        function nextQuestion() {
            currentIdx++;
            if (currentIdx < quizData.length) {
                showQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            document.getElementById('game-screen').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';
            document.getElementById('result-score').innerText = `${score}점 / 100점`;
            
            const emojiEl = document.getElementById('result-emoji');
            const rankEl = document.getElementById('result-rank');
            const descEl = document.getElementById('result-desc');
            
            if (score >= 90) {
                emojiEl.innerText = "👑";
                rankEl.innerText = "등급: 2026 신인류 밈 마스터";
                descEl.innerText = "난리자베스부터 성대 개방까지 싹 꿰뚫고 계시는군요! 당신은 유행을 소비하는 단계를 넘어 거의 밈을 창조하는 수준입니다. 폼이 아주 이븐하게 절정에 달하셨자베스!";
            } else if (score >= 70) {
                emojiEl.innerText = "✨";
                rankEl.innerText = "등급: 트렌디한 힙스터 (오히려 좋아)";
                descEl.innerText = "단톡방에서 드립 좀 친다는 소리 꽤나 들으시겠어요! 최신 트렌드를 아주 찰떡같이 이해하고 있으며 2026년 소통 지수 만점입니다. 완전 럭키비키잖아~🍀";
            } else if (score >= 40) {
                emojiEl.innerText = "😐";
                rankEl.innerText = "등급: 일반 현대인 (농협은행 단골)";
                descEl.innerText = "유행어를 대충 들어는 봤는데 정확한 유래나 최신 응용법(자베스 붙이기 등)에는 조금 약하시군요! 남들이 '라을라~' 하고 웃을 때 같이 하품하시면 안 됩니다. 조금만 더 도파민을 채워보세요!";
            } else {
                emojiEl.innerText = "👴";
                rankEl.innerText = "등급: 꼬들면 성격의 조선시대 선비";
                descEl.innerText = "상황이 아주 난리자베스네요... 혹시 스마트폰 대신 서적을 가까이 하시는 갓생러이신가요? 20문제를 알차게 새로 배웠으니 '오히려 좋아' 정신으로 오늘부터 인싸가 되어봅시다!";
            }
        }

        function restartGame() {
            currentIdx = 0;
            score = 0;
            document.getElementById('result-screen').style.display = 'none';
            document.getElementById('start-screen').style.display = 'block';
        }
    </script>
</body>
</html>
