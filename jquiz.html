<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 최신 신조어 & 밈 테스트 게임</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Gmarket+Sans:wght@500;700&family=Pretendard:wght@400;600;700&display=swap');

        :root {
            --bg-color: #f7f9fc;
            --container-bg: #ffffff;
            --primary-color: #6c5ce7;
            --primary-hover: #5b4bc4;
            --text-main: #2d3436;
            --text-sub: #636e72;
            --correct-color: #00b894;
            --incorrect-color: #d63031;
            --border-color: #dfe6e9;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .quiz-container {
            background-color: var(--container-bg);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 650px;
            padding: 35px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .start-screen, .result-screen {
            display: block;
        }

        .game-screen {
            display: none;
        }

        h1 {
            font-family: 'Gmarket Sans', sans-serif;
            font-weight: 700;
            font-size: 2rem;
            color: var(--primary-color);
            margin-bottom: 15px;
            word-break: keep-all;
        }

        .subtitle {
            font-size: 1.1rem;
            color: var(--text-sub);
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 15px 35px;
            font-size: 1.2rem;
            font-weight: 600;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 5px 15px rgba(108, 92, 231, 0.3);
            font-family: 'Pretendard', sans-serif;
        }

        .btn:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
        }

        .progress-bar-container {
            width: 100%;
            height: 8px;
            background-color: var(--border-color);
            border-radius: 4px;
            margin-bottom: 25px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            width: 5%;
            background-color: var(--primary-color);
            transition: width 0.3s ease;
        }

        .status-text {
            font-size: 0.95rem;
            color: var(--text-sub);
            font-weight: 600;
            margin-bottom: 15px;
            text-align: left;
        }

        .question-text {
            font-size: 1.35rem;
            font-weight: 700;
            line-height: 1.5;
            margin-bottom: 25px;
            text-align: left;
            word-break: keep-all;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 25px;
        }

        .option-btn {
            background-color: #f8f9fa;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            padding: 16px 20px;
            font-size: 1.05rem;
            font-weight: 600;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
            color: var(--text-main);
            font-family: 'Pretendard', sans-serif;
        }

        .option-btn:hover:not([disabled]) {
            background-color: #f1f2f6;
            border-color: #b2bec3;
        }

        .option-btn.correct {
            background-color: #e8f8f5;
            border-color: var(--correct-color);
            color: var(--correct-color);
        }

        .option-btn.incorrect {
            background-color: #fceae9;
            border-color: var(--incorrect-color);
            color: var(--incorrect-color);
        }

        .feedback-container {
            display: none;
            background-color: #f1f2f6;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
            text-align: left;
            border-left: 5px solid var(--primary-color);
        }

        .feedback-title {
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 6px;
        }

        .feedback-title.correct-text { color: var(--correct-color); }
        .feedback-title.incorrect-text { color: var(--incorrect-color); }

        .feedback-desc {
            font-size: 0.95rem;
            color: var(--text-sub);
            line-height: 1.5;
        }

        .next-btn {
            display: none;
            width: 100%;
        }

        .result-title {
            font-family: 'Gmarket Sans', sans-serif;
            font-size: 1.8rem;
            margin-bottom: 15px;
        }

        .result-score {
            font-size: 3.5rem;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 20px;
        }

        .result-rank {
            font-size: 1.3rem;
            font-weight: 700;
            background-color: #f1f2f6;
            display: inline-block;
            padding: 10px 25px;
            border-radius: 20px;
            margin-bottom: 25px;
            color: #2d3436;
        }

        .result-desc {
            font-size: 1.05rem;
            color: var(--text-sub);
            line-height: 1.6;
            margin-bottom: 35px;
            word-break: keep-all;
        }

        .badge-img {
            font-size: 4.5rem;
            margin-bottom: 15px;
            animation: bounce 1s infinite alternate;
        }

        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-10px); }
        }
    </style>
</head>
<body>

    <div class="quiz-container">
        <!-- 1. 시작 화면 -->
        <div id="start-screen" class="start-screen">
            <div class="badge-img">🤫</div>
            <h1>허제니 신조어 고사</h1>
            <p class="subtitle">2024~2025년을 강타한 대세 유행어부터<br>2026년 최신 드립까지 총 20문제!<br>당신의 트렌드 세터 지수를 측정해보세요.</p>
            <button class="btn" onclick="startGame()">테스트 시작하기</button>
        </div>

        <!-- 2. 게임 화면 -->
        <div id="game-screen" class="game-screen">
            <div class="status-text" id="status-text">문제 1 / 20</div>
            <div class="progress-bar-container">
                <div class="progress-bar" id="progress-bar"></div>
            </div>
            
            <div class="question-text" id="question-text">질문 내용이 여기에 들어갑니다.</div>
            
            <div class="options-container" id="options-container">
                <!-- 선택지 버튼이 동적으로 생성됨 -->
            </div>

            <div class="feedback-container" id="feedback-container">
                <div class="feedback-title" id="feedback-title">정답입니다!</div>
                <div class="feedback-desc" id="feedback-desc">해설 내용</div>
            </div>

            <button class="btn next-btn" id="next-btn" onclick="nextQuestion()">다음 문제 ▶</button>
        </div>

        <!-- 3. 결과 화면 -->
        <div id="result-screen" class="result-screen" style="display: none;">
            <div class="badge-img" id="result-emoji">👑</div>
            <div class="result-title">당신의 트렌드 지수는?</div>
            <div class="result-score" id="result-score">0점 / 100점</div>
            <div class="result-rank" id="result-rank">등급 로딩중...</div>
            <p class="result-desc" id="result-desc">결과 분석 내용이 들어갑니다.</p>
            <button class="btn" onclick="restartGame()">다시 도전하기</button>
        </div>
    </div>

    <script>
        const quizData = [
            {
                q: "2026년 최신 유행어로, 기분 나쁜 소리나 잔소리를 들었을 때 한 귀로 흘리며 상대를 완벽하게 티배깅(도발)하는 대답은?",
                a: ["응~ 니 말이 다 마장동 한우 세트야~", "어쩔티비 저쩔쿠쿠", "어웅 그래쪄염 우쭈쭈", "네 맞아요 제가 다 틀렸습니다"],
                cor: 0,
                desc: "상대방의 훈수나 공격을 '하나도 안 들리고, 그저 값비싼 한우 세트처럼 번지르르하고 좋은 소리네~'라며 완벽하게 무시할 때 쓰는 극강의 킹받는 반박어입니다."
            },
            {
                q: "흑백요리사 안성재 셰프가 탈락을 결정지을 때 쓰며 대유행한 말로, 완성도나 밸런스가 완벽히 맞지 않을 때 쓰는 이 어휘는?",
                a: ["고기가 겉바속촉하지 않아요", "고기가 리드미컬하게 구워지지 않았어요", "고기가 이븐(Even)하게 익지 않았어요", "고기가 아방가르드하네요"],
                cor: 2,
                desc: "미간을 찌푸리며 '이븐(Even)하게 익지 않았다'고 평한 안성재 셰프의 심사평은 라면 물 조절 실패부터 과제물 검사까지 온갖 일상에 쓰이는 필수 밈이 되었습니다."
            },
            {
                q: "한 외국인이 한국인 편의점 알바생에게 한 서툰 발음의 고백을 알바생이 은행 이름으로 착각해 유행이 된 역대급 플러팅 밈은?",
                a: ["우리은행", "농협은행", "국민은행", "카카오뱅크"],
                cor: 1,
                desc: "'너무 예쁘네요'를 서툴게 발음한 외국인에게 '농협은행은 사거리로 가셔야 해요'라며 철벽을 친 감동 실화에서 유래한 밈입니다. (너무 예쁘네요 = 농협은행, 귀엽네요 = 기업은행)"
            },
            {
                q: "2026년 신조어로, 매사에 배배 꼬여서 사사건건 시비를 걸거나 프로불편러 짓을 하는 사람을 칭하는 면(라면) 종류는?",
                a: ["스크루바", "꽈배기면", "꼬들면", "퍼진면"],
                cor: 2,
                desc: "성격이 라면 '꼬들면'처럼 꼬여있는 사람에게 '너 오늘 왜 이렇게 성격이 꼬들면이냐? 좀 푹 끓여져라(둥글게 살아라)'라며 일침을 날릴 때 씁니다."
            },
            {
                q: "아이브 장원영이 보여준 무한 긍정 사고방식인 '원영적 사고'의 핵심 시그니처 감탄사이자 유행어는?",
                a: ["오히려 좋아!", "완전 럭키비키잖아~", "가보자고!", "폼 미쳤다"],
                cor: 1,
                desc: "최악의 상황(ex. 앞에 빵이 다 팔림)에서도 '덕분에 갓 구운 새 빵을 먹게 되다니 완전 행운(장원영의 영어이름 비키)'이라고 정신승리하는 마법의 긍정 주문입니다."
            },
            {
                q: "한강이 얼어붙은 한겨울 뉴스 리포트에서 유래되어, 수많은 아이돌과 인플루언서들이 뚝딱거리는 고양이 댄스 챌린지로 유행시킨 이 문장은?",
                a: ["꽁꽁 얼어붙은 한강 위로 고양이가 걸어다닙니다", "추운 겨울 한강에 고양이가 식빵을 굽고 있습니다", "고양이가 얼음판 위에서 슬라이딩을 합니다", "얼어 죽어도 고양이는 한강으로 갑니다"],
                cor: 0,
                desc: "실제 뉴스 기자의 리포팅 대사에 중독성 있는 비트를 입혀 2024년을 대유행으로 물들인 레전드 뚝딱이 고양이 챌린지 밈입니다."
            },
            {
                q: "초등학생 서이브가 발표해 챌린지 열풍을 일으킨 곡으로, '선배! 마라탕 사주세요!'라는 가사와 함께 탕탕 튕기는 춤으로 유명한 이 대세 밈은?",
                a: ["마라샹궈", "탕후루후루", "마라탕후루", "마라탕웨이"],
                cor: 2,
                desc: "'탕탕 후루후루~ 탕탕탕 후루루루루~'라는 엄청난 중독성의 가사와 손가락을 튕기는 안무로 전국 초등학생과 아이돌의 필수 코스가 된 챌린지입니다."
            },
            {
                q: "유튜브 '피식대학' 등에서 시작된 드립으로, 무언가 과하게 멋지거나 압도적인 퍼포먼스를 보였을 때 'OO 미쳤다'라고 표현하는 신조어는?",
                a: ["몸", "결", "값", "폼"],
                cor: 3,
                desc: "'폼(Form) 미쳤다'는 스포츠 선수의 좋은 기량을 칭찬하던 말에서 유래해, 현재는 대단한 모든 상황과 패션, 결과물을 아우르는 감탄사로 장기 집권 중입니다."
            },
            {
                q: "2026년 최신 밈으로, 어떤 사람이 지나치게 똑똑한 척하거나 아는 체를 할 때 '오~ 너 혹시 OO 백과사전이야?'라고 비꼬며 쓰는 도서 이름은?",
                a: ["동의보감", "주가조작", "위키백과", "챗GPT"],
                cor: 0,
                desc: "구구절절 TMI(투머치토커)를 남발하거나 아재 같은 훈수를 두는 사람에게 '오~ 네 말이 다 동의보감이다~'라며 영혼 없이 맞장구칠 때 쓰는 유행어입니다."
            },
            {
                q: "상대방이 너무 어처구니없고 당황스러운 행동을 할 때 '지금 OO하는 부분인가요?' 또는 '진짜 OO하네'라며 화가 나고 어이없는 감정을 표현하는 대세 접두사는?",
                a: ["킹받네", "갓받네", "캡받네", "핵받네"],
                cor: 0,
                desc: "웹툰 작가 침착맨이 유행시킨 '킹받네(King+킹받네)'는 이미 표준어 급으로 완벽하게 정착한 대한민국 대표 감정 표현입니다."
            },
            {
                q: "2025~2026년에 인기를 끄는 신조어로, '비주얼이나 분위기가 너무 트렌디하고 합해서 미쳐버리겠다'를 세 글자로 줄인 것은?",
                a: ["지린다", "지락실", "기정떡", "추구미"],
                cor: 3,
                desc: "내가 닮고 싶어 하거나 지향하는 아름다움, 스타일, 혹은 아이덴티티를 뜻하는 단어로 '내 이번 달 추구미는 퇴폐미야' 처럼 자주 쓰입니다."
            },
            {
                q: "아이돌이나 배우의 얼굴, 또는 어떤 상품의 퀄리티가 말도 안 되게 완벽해서 신성함을 느낄 때 앞에 붙이는 최고의 극찬 접두사는?",
                a: ["킹(King)", "갓(God)", "짱(Jjang)", "빛(Light)"],
                cor: 1,
                desc: "God(신)을 붙여 '갓벽하다(신이 내린 완벽)', '갓조형' 처럼 최고 중의 최고를 찬양할 때 쓰는 접두사 밈입니다."
            },
            {
                q: "2026년 최신 숏폼에서 주로 쓰는 은어로, 열심히 일하거나 공부는 안 하면서 도파민 가득한 숏폼이나 영상만 하루 종일 뇌가 절여질 때까지 보는 상태를 뜻하는 단어는?",
                a: ["도파민 중독", "뇌절", "도파민 좀비", "숏폼 워커"],
                cor: 2,
                desc: "생산적인 일은 전혀 하지 못한 채 침대에 누워 다음 영상만 끊임없이 넘겨보는 현대인들의 안타깝고도 웃픈 모습을 '도파민 좀비'라고 칭합니다."
            },
            {
                q: "어떤 상황이 내 생각과 전혀 다르게 흘러가거나 뒤통수를 맞았을 때, 어이없음을 한탄하며 독백하듯 쓰는 2025~2026년 유행 서술어는?",
                a: ["이게 무슨 일이고", "여기서 요리가 이렇게 된다고?", "이게 맞나", "어라라? 당황스럽네"],
                cor: 2,
                desc: "말도 안 되는 막장 상황이나 황당한 현실을 마주했을 때 먼 산을 바라보며 나지막이 '하... 이게 맞나...'라고 읊조리는 유행어입니다."
            },
            {
                q: "인터넷 커뮤니티에서 시작되어, 상대방이 억지 논리를 펼치거나 억까를 시전할 때 '응~ 안 들어~'라며 단호하고 귀엽게 거절하는 세 글자 의성어는?",
                a: ["시러요", "반사~", "맴맴", "웅앵웅"],
                cor: 3,
                desc: "상대방이 뭐라고 구구절절 변명하거나 헛소리를 늘어놓을 때 대꾸할 가치도 없다는 듯 '웅앵웅... 초키포키...' 또는 '웅앵웅' 한마디로 종결시키는 치트키 반박어입니다."
            },
            {
                q: "아이돌 팬덤 사이에서 시작해 머글(일반인)들에게도 정착된 단어로, 누군가의 귀엽고 찌질하거나 사랑스러운 순간의 행동을 포착해 부르는 밈은?",
                a: ["입덕 부정기", "모에화", "덕통사고", "필살기"],
                cor: 1,
                desc: "대상을 동물이나 귀여운 캐릭터에 빗대어 그 귀여움을 극대화하는 행위를 '모에화'라고 부르며 일상에서도 자주 사용됩니다."
            },
            {
                q: "2026년 최신 드립으로, 단체 톡방이나 댓글창에서 누군가 갑자기 분위기를 싸하게 만드는 진지충 짓을 했을 때 쓰는 경고성 유행어는?",
                a: ["너 일루와봐", "혹시 T발 C야?", "갑분싸 유죄인간", "경찰 부릅니다"],
                cor: 1,
                desc: "공감 능력이 부족한 MBTI 'T(이성형)'의 성향을 드립으로 승화시켜, 눈치 없이 지나치게 이성적인 팩폭을 날리며 찬물을 끼얹는 사람에게 쓰는 유행어입니다."
            },
            {
                q: "과거의 유행어 '안습(안구에 습기)'의 계보를 잇는 최신 유행어로, 너무 슬프거나 감동적인 상황에서 눈물이 차오르는 모습을 유쾌하게 표현한 단어는?",
                a: ["눈물 광광", "눈물 줄줄", "눈물 좔좔", "오열"],
                cor: 0,
                desc: "'눈물 광광 우럭따' 등으로 쓰이며 격한 눈물이나 슬픔, 혹은 귀여운 투정을 부릴 때 텍스트로 애용되는 인터넷 밈입니다."
            },
            {
                q: "비밀이나 반전 사실이 밝혀졌을 때 감탄하는 신조어로, '알고 보니 소름 돋는다' 또는 '이거 완전 대박 반전인데?'의 의미를 담은 표현은?",
                a: ["반박불가", "알잘딱깐센", "알고 보니 OO", "반전 매력"],
                cor: 2,
                desc: "주로 유튜브 썸네일이나 커뮤니티 글제목에서 '알고 보니 충격적인 진실'의 뜻으로 '알고 보니 OO' 포맷이 정보성 유행어로 확고하게 자리 잡았습니다."
            },
            {
                q: "마지막 문제! 이 모든 퀴즈를 다 풀고 난 뒤 점수가 낮게 나왔을 때, 트렌드 세터로서 정신 건강을 지키기 위해 시전해야 할 가장 바람직한 태도는?",
                a: ["속상해서 밤새 울기", "내가 몰랐던 밈을 20개나 새로 배웠잖아? 완전 럭키비키잖아! 🍀", "이 퀴즈 만든 사람 고소하기", "트렌드 따위 포기하고 산으로 가기"],
                cor: 1,
                desc: "정답은 당연히 1번! 틀려도 원영적 사고를 장착하면 '오히려 좋아!'를 외치며 트렌드 마스터로 거듭날 수 있습니다. 고생하셨습니다!"
            }
        ];

        let currentIdx = 0;
        let score = 0;

        function startGame() {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
            showQuestion();
        }

        function showQuestion() {
            const data = quizData[currentIdx];
            
            // 상태 및 프로그레스 바 업데이트
            document.getElementById('status-text').innerText = `문제 ${currentIdx + 1} / ${quizData.length}`;
            document.getElementById('progress-bar').style.width = `${((currentIdx + 1) / quizData.length) * 100}%`;
            
            // 질문 텍스트
            document.getElementById('question-text').innerText = data.q;
            
            // 선택지 생성
            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';
            
            data.a.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = `${idx + 1}. ${opt}`;
                btn.onclick = () => checkAnswer(idx);
                optionsContainer.appendChild(btn);
            });
            
            // 피드백 및 다음 버튼 숨기기
            document.getElementById('feedback-container').style.display = 'none';
            document.getElementById('next-btn').style.display = 'none';
        }

        function checkAnswer(selectedIdx) {
            const data = quizData[currentIdx];
            const options = document.querySelectorAll('.option-btn');
            
            // 모든 버튼 비활성화
            options.forEach(btn => btn.disabled = true);
            
            const feedbackContainer = document.getElementById('feedback-container');
            const feedbackTitle = document.getElementById('feedback-title');
            const feedbackDesc = document.getElementById('feedback-desc');
            
            if (selectedIdx === data.cor) {
                options[selectedIdx].classList.add('correct');
                feedbackTitle.innerText = "🎉 정답입니다! (나이스!)";
                feedbackTitle.className = "feedback-title correct-text";
                score += 5; // 20문제이므로 한 문제당 5점
            } else {
                options[selectedIdx].classList.add('incorrect');
                options[data.cor].classList.add('correct'); // 정답 하이라이트
                feedbackTitle.innerText = "💥 틀렸습니다! (킹받네...)";
                feedbackTitle.className = "feedback-title incorrect-text";
            }
            
            feedbackDesc.innerText = data.desc;
            feedbackContainer.style.style = 'block';
            feedbackContainer.style.display = 'block';
            
            document.getElementById('next-btn').style.display = 'block';
        }

        function nextQuestion() {
            currentIdx++;
            if (currentIdx < quizData.length) {
                showQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            document.getElementById('game-screen').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';
            
            document.getElementById('result-score').innerText = `${score}점 / 100점`;
            
            const emojiEl = document.getElementById('result-emoji');
            const rankEl = document.getElementById('result-rank');
            const descEl = document.getElementById('result-desc');
            
            if (score >= 90) {
                emojiEl.innerText = "👑";
                rankEl.innerText = "등급: 고인물 밈 마스터 (신인류)";
                descEl.innerText = "당신은 숨 쉬듯 숏폼을 보며 트렌드를 창조하는 이 시대의 진정한 밈 마스터입니다. 2026년 최신 킹받는 드립까지 섭렵한 당신의 능력에 무릎을 탁 치고 갑니다. 완벽하게 이븐하게 익으셨네요!";
            } else if (score >= 70) {
                emojiEl.innerText = "🔥";
                rankEl.innerText = "등급: 트렌디한 인싸 (오히려 좋아)";
                descEl.innerText = "대부분의 유행어를 찰떡같이 알아듣는 힙스터군요! 소통에 전혀 지장이 없으며 은근히 드립을 던져 사람들을 피식하게 만들 줄 아는 센스쟁이입니다. 완전 럭키비키잖아~🍀";
            } else if (score >= 40) {
                emojiEl.innerText = "😐";
                rankEl.innerText = "등급: 평범한 현대인 (농협은행 지점장)";
                descEl.innerText = "유행어를 들어본 적은 있지만 정확한 뜻이나 유래는 잘 모르는 상태군요! 남들이 웃을 때 뒤늦게 '농협은행이 왜..?'라며 검색해 볼 가능성이 큽니다. 분발하세요!";
            } else {
                emojiEl.innerText = "👴";
                rankEl.innerText = "등급: 화석 / 조선시대 선비";
                descEl.innerText = "혹시 성격이 라면 꼬들면이신가요? 아니면 스마트폰을 멀리하시는 진정한 자연인이신가요? 트렌드와는 다소 먼 삶을 살고 계시지만, 슬퍼하지 마세요. 20문제를 새로 배웠으니 완전 럭키비키잖아!";
            }
        }

        function restartGame() {
            currentIdx = 0;
            score = 0;
            document.getElementById('result-screen').style.display = 'none';
            document.getElementById('start-screen').style.display = 'block';
        }
    </script>
</body>
</html>
