<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JENNIE LAND</title>
<style>
    body {
        margin: 0;
        background-color: #121212;
        color: #e0e0e0;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        overflow: hidden;
    }
    #start-screen, #result-screen {
        text-align: center;
    }
    h1 {
        font-size: 2rem;
        margin-bottom: 10px;
        color: #fff;
    }
    p { margin-bottom: 30px; color: #aaa; }
    button {
        padding: 12px 24px;
        font-size: 1.2rem;
        font-weight: bold;
        color: #121212;
        background-color: #fff;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        transition: transform 0.1s, background-color 0.2s;
    }
    button:hover { background-color: #ddd; }
    button:active { transform: scale(0.95); }
    
    #game-container {
        display: none;
        width: 100%;
        max-width: 450px;
        padding: 20px;
        box-sizing: border-box;
    }
    #header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
        font-size: 1.2rem;
        font-weight: bold;
        background: #1e1e1e;
        padding: 15px;
        border-radius: 12px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.3);
    }
    #lives-display { color: #ff4757; letter-spacing: 2px; }
    #delta-display { color: #2ed573; font-family: monospace; font-size: 1.3rem; }
    
    #grid {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 10px;
    }
    .tile {
        aspect-ratio: 1;
        border-radius: 10px;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 1.5rem;
        font-weight: bold;
        cursor: pointer;
        transition: transform 0.1s;
        user-select: none;
        box-shadow: inset 0 2px 4px rgba(255,255,255,0.1), 0 4px 8px rgba(0,0,0,0.2);
    }
    .tile:active { transform: scale(0.92); }
    
    .shake { animation: shake 0.3s; }
    @keyframes shake {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(-6px); }
        75% { transform: translateX(6px); }
    }
    
    .highlight {
        border: 4px solid #fff;
        box-shadow: 0 0 20px #fff;
        z-index: 10;
        transform: scale(1.05);
    }
</style>
</head>
<body>

    <div id="start-screen">
        <h1>JENNIE LAND</h1>
        <p>하드코어 색맹 테스트<br>눈 멀쩡하세요?</p>
        <button onclick="startGame()">START</button>
    </div>

    <div id="game-container">
        <div id="header">
            <div id="level-display">Lv. 1</div>
            <div id="lives-display">❤️❤️❤️</div>
            <div id="delta-display">색상차이 10.0%</div>
        </div>
        <div id="grid"></div>
    </div>

    <div id="result-screen" style="display: none;">
        <h1>테스트 종료</h1>
        <p>10단계 못넘기면 병원으로</p>
        <button onclick="location.reload()">다시 하기</button>
    </div>

<script>
    let level = 1;
    let lives = 3;
    const maxLevel = 30;
    let isTransitioning = false;
    let audioCtx = null;

    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
    }

    function playSound(type) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        const now = audioCtx.currentTime;

        if (type === 'correct') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(880, now); // 높은 도(A5)
            gain.gain.setValueAtTime(0.1, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
            osc.start(now);
            osc.stop(now + 0.1);
        } else if (type === 'wrong') {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(150, now); // 낮은 둔탁한 소리
            gain.gain.setValueAtTime(0.1, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
            osc.start(now);
            osc.stop(now + 0.15);
        } else if (type === 'fail') {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(400, now);
            osc.frequency.exponentialRampToValueAtTime(50, now + 0.8); // 하강음
            gain.gain.setValueAtTime(0.1, now);
            gain.gain.linearRampToValueAtTime(0.001, now + 0.8);
            osc.start(now);
            osc.stop(now + 0.8);
        }
    }

    function startGame() {
        initAudio();
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('game-container').style.display = 'block';
        renderLevel();
    }

    function getDelta() {
        // 비선형 감소 공식: 1레벨(10) -> 30레벨(1)
        return 10 * Math.pow(0.1, (level - 1) / (maxLevel - 1));
    }

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function renderLevel() {
        if (level > maxLevel) {
            document.getElementById('game-container').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';
            return;
        }

        isTransitioning = false;
        lives = 3;
        
        const delta = getDelta();
        document.getElementById('level-display').textContent = `Lv. ${level}`;
        document.getElementById('lives-display').textContent = '❤️'.repeat(lives);
        document.getElementById('delta-display').textContent = `Δ ${delta.toFixed(1)}%`;

        const grid = document.getElementById('grid');
        grid.innerHTML = '';

        // 무작위 기본 색상 생성 (너무 어둡거나 밝지 않게 제어)
        const hue = Math.floor(Math.random() * 360);
        const sat = 50 + Math.floor(Math.random() * 30); // 50~80%
        const lit = 40 + Math.floor(Math.random() * 20); // 40~60%

        const baseColor = `hsl(${hue}, ${sat}%, ${lit}%)`;
        
        // 정답 타일 색상 계산 (명도를 delta만큼 조절, 100을 넘지 않게 처리)
        let targetLit = lit + delta;
        if (targetLit > 80) targetLit = lit - delta; 
        const answerColor = `hsl(${hue}, ${sat}%, ${targetLit}%)`;

        // 텍스트 색상을 기본 타일 기준으로 하나만 계산하여 통일 (힌트 차단)
        const textColor = lit < 50 ? 'rgba(255,255,255,0.85)' : 'rgba(0,0,0,0.7)';

        let numbers = Array.from({length: 25}, (_, i) => i + 1);
        numbers = shuffle(numbers);
        const answerIndex = Math.floor(Math.random() * 25);

        for (let i = 0; i < 25; i++) {
            const tile = document.createElement('div');
            tile.className = 'tile';
            tile.textContent = numbers[i];
            tile.style.backgroundColor = (i === answerIndex) ? answerColor : baseColor;
            tile.style.color = textColor;
            tile.dataset.isAnswer = (i === answerIndex);
            
            tile.onclick = () => handleTileClick(tile, i === answerIndex);
            grid.appendChild(tile);
        }
    }

    function handleTileClick(tile, isAnswer) {
        if (isTransitioning) return;
        initAudio(); // 브라우저 정책 대응 (재확인)

        if (isAnswer) {
            playSound('correct');
            level++;
            renderLevel();
        } else {
            lives--;
            document.getElementById('lives-display').textContent = '❤️'.repeat(lives);
            
            tile.classList.remove('shake');
            void tile.offsetWidth; // DOM Reflow 트리거 (애니메이션 재시작)
            tile.classList.add('shake');

            if (lives > 0) {
                playSound('wrong');
            } else {
                playSound('fail');
                isTransitioning = true; // 추가 클릭 방지
                
                // 정답 강조
                const tiles = document.querySelectorAll('.tile');
                tiles.forEach(t => {
                    if (t.dataset.isAnswer === 'true') {
                        t.classList.add('highlight');
                    }
                });

                // 1.5초 후 다음 레벨 강제 진행
                setTimeout(() => {
                    level++;
                    renderLevel();
                }, 1500);
            }
        }
    }
</script>

</body>
</html>
