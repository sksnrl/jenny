<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JENNIE LAND - SLEEK PRO</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        * { box-sizing: border-box; font-family: 'Pretendard', sans-serif; user-select: none; -webkit-user-select: none; touch-action: none; }
        body { margin: 0; padding: 0; background-color: #0f0f1e; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }
        h1 { color: #ffeb3b; margin-bottom: 5px; text-shadow: 0 0 15px #ff9800, 2px 2px 0px #fff; font-size: 2.2rem; letter-spacing: 2px; }
        #game-wrapper { position: relative; background: #1a1a2e; padding: 15px; border-radius: 20px; box-shadow: 0 15px 60px rgba(255,235,59,0.15), inset 0 0 30px #0a0a1a; border: 2px solid #333; }
        #game-container { width: 700px; height: 600px; border-radius: 12px; overflow: hidden; background: linear-gradient(to bottom, #101025, #202040); border: 6px solid #ffeb3b; position: relative; }
        canvas { display: block; }
        .status-panel { position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.85); color: #00e676; padding: 12px 18px; border-radius: 10px; font-weight: 900; border: 2px solid #ffeb3b; text-align: right; min-width: 200px; z-index: 10; line-height: 1.4; }
        .controls { display: flex; justify-content: center; gap: 15px; margin-top: 25px; }
        button { padding: 18px 35px; font-size: 19px; font-weight: 900; color: #fff; background-color: #29b6f6; border: none; border-radius: 15px; cursor: pointer; box-shadow: 0 8px 0 #0277bd; transition: all 0.05s ease; }
        button:active:not(:disabled) { transform: translateY(6px); box-shadow: 0 2px 0 #0277bd; }
        button:disabled { background-color: #455a64; box-shadow: 0 8px 0 #263238; opacity: 0.7; }
        #btn-down { background-color: #ff4081; box-shadow: 0 8px 0 #c2185b; }
        #modal-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 100; border-radius: 12px; }
        #result-modal { background: #2a2a4a; border: 4px solid #ffeb3b; border-radius: 20px; padding: 30px; width: 400px; text-align: center; color: white; box-shadow: 0 0 30px rgba(255, 235, 59, 0.3); }
        #result-list { margin: 20px 0; padding: 15px; background: #1a1a2e; border-radius: 10px; max-height: 150px; overflow-y: auto; text-align: left; font-size: 0.95rem; line-height: 1.6; }
        .restart-btn { background: #00e676; color: #000; font-weight: 900; padding: 12px 30px; border-radius: 10px; cursor: pointer; border: none; font-size: 1.1rem; }
    </style>
</head>
<body>

    <h1>🕹️ JENNIE LAND 🕹️</h1>

    <div id="game-wrapper">
        <div id="game-container">
            <div class="status-panel" id="status-text">남은 기회: 3/3<br>준비 완료!</div>
            <div id="modal-overlay">
                <div id="result-modal">
                    <h2>GAME OVER</h2>
                    <p id="total-count">총 0개를 뽑았습니다!</p>
                    <div id="result-list"></div>
                    <button class="restart-btn" onclick="initGame()">다시 하기</button>
                </div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button id="btn-left">◀ LEFT</button>
        <button id="btn-right">RIGHT ▶</button>
        <button id="btn-down">👇 GRAB!</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(type) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;
            if (type === 'move') { osc.type = 'square'; osc.frequency.setValueAtTime(150, now); gain.gain.setValueAtTime(0.05, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1); osc.start(); osc.stop(now + 0.1); }
            else if (type === 'drop') { osc.type = 'sawtooth'; osc.frequency.setValueAtTime(400, now); osc.frequency.exponentialRampToValueAtTime(200, now + 0.5); gain.gain.setValueAtTime(0.1, now); gain.gain.linearRampToValueAtTime(0, now + 0.5); osc.start(); osc.stop(now + 0.5); }
            else if (type === 'grab') { osc.type = 'sine'; osc.frequency.setValueAtTime(800, now); gain.gain.setValueAtTime(0.2, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2); osc.start(); osc.stop(now + 0.2); }
            else if (type === 'success') { osc.type = 'triangle'; osc.frequency.setValueAtTime(523.25, now); osc.frequency.exponentialRampToValueAtTime(783.99, now + 0.2); gain.gain.setValueAtTime(0.2, now); gain.gain.linearRampToValueAtTime(0, now + 0.3); osc.start(); osc.stop(now + 0.3); }
            else if (type === 'fail') { osc.type = 'sawtooth'; osc.frequency.setValueAtTime(200, now); gain.gain.setValueAtTime(0.1, now); gain.gain.linearRampToValueAtTime(0, now + 0.3); osc.start(); osc.stop(now + 0.3); }
        }

        const { Engine, Render, Runner, Bodies, Body, Composite, Events, Constraint } = Matter;
        let engine = Engine.create();
        let world = engine.world;
        world.gravity.y = 1.6;
        engine.positionIterations = 12; 
        engine.velocityIterations = 12;

        const render = Render.create({
            element: document.getElementById('game-container'), engine: engine,
            options: { width: 700, height: 600, wireframes: false, background: 'transparent' }
        });
        Render.run(render);
        const runner = Runner.create();
        Runner.run(runner, engine);

        let attempts = 0; const MAX_ATTEMPTS = 3;
        let caughtItems = []; let toys = [];
        let gameState = 'IDLE'; 
        let isMovingLeft = false, isMovingRight = false;
        let actionTimer = 0;
        
        const PIVOT_X = 22; const PIVOT_Y = 22; 
        const ANGLE_OPEN = 1.1; const ANGLE_CLOSE = 0.15;
        let targetAngle = ANGLE_OPEN; let currentAngle = ANGLE_OPEN;
        let releaseType = 'NONE'; let releasePoint = 0; let releaseStrength = 0;

        const uiStatus = document.getElementById('status-text'), btnLeft = document.getElementById('btn-left'), btnRight = document.getElementById('btn-right'), btnDown = document.getElementById('btn-down');
        const modalOverlay = document.getElementById('modal-overlay'), totalCountTxt = document.getElementById('total-count'), resultListTxt = document.getElementById('result-list');
        let trolley, clawBase, leftArm, rightArm, rope, ropeBody;

        const itemNames = ["구독", "퀵뷰", "신청곡", "노래", "역구독", "댄스", "셀카", "방셀", "스쿼트20", "뽑기5", "배민", "꽝", "임티", "역팬200"];

        function updateUI(msg) { uiStatus.innerHTML = `남은 기회: ${MAX_ATTEMPTS - attempts}/${MAX_ATTEMPTS}<br>${msg}`; }
        function showResultModal() { modalOverlay.style.display = 'flex'; totalCountTxt.innerText = `총 ${caughtItems.length}개를 뽑으셨습니다!`; resultListTxt.innerHTML = caughtItems.length > 0 ? caughtItems.join(", ") : "뽑은 아이템이 없습니다 😢"; }

        function initGame() {
            modalOverlay.style.display = 'none';
            Composite.clear(world);
            attempts = 0; caughtItems = []; toys = []; gameState = 'IDLE';
            btnDown.disabled = false; btnLeft.disabled = false; btnRight.disabled = false;

            const wallColor = '#0a0a1a';
            const ground = Bodies.rectangle(350, 610, 720, 60, { isStatic: true, render: { fillStyle: wallColor } });
            const lWall = Bodies.rectangle(-10, 300, 60, 620, { isStatic: true, render: { fillStyle: wallColor } });
            const rWall = Bodies.rectangle(710, 300, 60, 620, { isStatic: true, render: { fillStyle: wallColor } });
            const binWall = Bodies.rectangle(170, 410, 20, 400, { isStatic: true, render: { fillStyle: '#ff4081' } });
            const binFloor = Bodies.rectangle(85, 590, 150, 20, { isStatic: true, render: { fillStyle: '#000' } });

            trolley = Bodies.rectangle(400, 30, 60, 10, { isStatic: true, render: { visible: false } });
            clawBase = Bodies.rectangle(400, 80, 60, 30, { 
                frictionAir: 0.1, density: 0.15, inertia: Infinity, collisionFilter: { group: -1 },
                render: { fillStyle: '#455a64', strokeStyle: '#ffeb3b', lineWidth: 3 } 
            });

            // --- [수정] 줄 물리 충돌체 슬림화 (10 -> 4) ---
            ropeBody = Bodies.rectangle(400, 55, 4, 1, { isStatic: false, density: 0.01, collisionFilter: { group: -1 }, render: { visible: false } });

            const armGroup = -1;
            // --- [수정] 발톱 물리 두께 슬림화 (20 -> 8) ---
            const leftParts = [ 
                Bodies.rectangle(0, 30, 8, 60, { render: { fillStyle: '#78909c' } }), 
                Bodies.rectangle(10, 65, 40, 8, { angle: 0.4, friction: 1.0, render: { fillStyle: '#ffeb3b' } }) 
            ];
            const rightParts = [ 
                Bodies.rectangle(0, 30, 8, 60, { render: { fillStyle: '#78909c' } }), 
                Bodies.rectangle(-10, 65, 40, 8, { angle: -0.4, friction: 1.0, render: { fillStyle: '#ffeb3b' } }) 
            ];

            leftArm = Body.create({ parts: leftParts, collisionFilter: { group: armGroup }, inertia: Infinity });
            rightArm = Body.create({ parts: rightParts, collisionFilter: { group: armGroup }, inertia: Infinity });

            rope = Constraint.create({ bodyA: trolley, bodyB: clawBase, pointA: { x: 0, y: 0 }, pointB: { x: 0, y: -15 }, length: 60, stiffness: 0.8, damping: 0.1, render: { visible: false } });
            const jointL = Constraint.create({ bodyA: clawBase, bodyB: leftArm, pointA: { x: -PIVOT_X, y: PIVOT_Y }, pointB: { x: 0, y: 0 }, stiffness: 1, length: 0, render: { visible: false } });
            const jointR = Constraint.create({ bodyA: clawBase, bodyB: rightArm, pointA: { x: PIVOT_X, y: PIVOT_Y }, pointB: { x: 0, y: 0 }, stiffness: 1, length: 0, render: { visible: false } });

            const colors = ["#ffd740", "#ff1744", "#d500f9", "#00b0ff", "#00e676"];
            for (let i = 0; i < 42; i++) {
                const name = itemNames[i % itemNames.length];
                let radius = (["배민", "방셀", "역팬200"].includes(name)) ? 16 : 24;
                const body = Bodies.circle(250 + Math.random() * 400, 500 + Math.random() * 60, radius, { restitution: 0.05, friction: 0.8, density: 0.005, label: name, render: { fillStyle: colors[i % colors.length], strokeStyle: '#fff', lineWidth: 2 } });
                body.isCaught = false; toys.push(body);
            }
            Composite.add(world, [ground, lWall, rWall, binWall, binFloor, trolley, clawBase, leftArm, rightArm, rope, ropeBody, jointL, jointR, ...toys]);
            updateUI("준비 완료!");
        }

        function setReleaseLogic(pickupX) {
            const rand = Math.random();
            if (rand < 0.2) releaseType = 'NONE';
            else if (rand < 0.4) { releaseType = 'ASCENT'; releasePoint = 150 + Math.random() * 250; }
            else { releaseType = 'TRAVEL'; const minX = 180; releasePoint = (pickupX > minX + 10) ? minX + Math.random() * (pickupX - minX) : minX + Math.random() * 22; }
            releaseStrength = 0.75 + Math.random() * 0.2;
        }

        Events.on(engine, 'beforeUpdate', function() {
            if (!rope || !clawBase || !leftArm || !rightArm || !ropeBody) return;
            const ropeLen = rope.length;
            const midY = (30 + clawBase.position.y - 15) / 2;
            Body.setPosition(ropeBody, { x: clawBase.position.x, y: midY });
            Body.scale(ropeBody, 1, Math.max(ropeLen, 10) / (ropeBody.bounds.max.y - ropeBody.bounds.min.y));

            let lerp = (gameState === 'DROPPING') ? 0.4 : 0.12;
            currentAngle += (targetAngle - currentAngle) * lerp;
            Body.setAngle(leftArm, currentAngle);
            Body.setAngle(rightArm, -currentAngle);

            const speedX = 3.0, speedRope = 2.5, maxRope = 485;
            let tx = trolley.position.x;

            switch (gameState) {
                case 'IDLE':
                    if (isMovingLeft && tx > 300) { tx -= speedX; playSound('move'); }
                    if (isMovingRight && tx < 680) { tx += speedX; playSound('move'); }
                    Body.setPosition(trolley, { x: tx, y: 30 });
                    targetAngle = ANGLE_OPEN;
                    break;
                case 'DROPPING':
                    if (rope.length === 60) playSound('drop');
                    targetAngle = ANGLE_OPEN;
                    if (rope.length < maxRope) rope.length += speedRope;
                    else { gameState = 'GRABBING'; actionTimer = 0; targetAngle = ANGLE_CLOSE; btnDown.disabled = true; playSound('grab'); setReleaseLogic(clawBase.position.x); }
                    break;
                case 'GRABBING':
                    actionTimer++; if (actionTimer > 60) gameState = 'ASCENDING';
                    break;
                case 'ASCENDING':
                    if (rope.length > 90) {
                        rope.length -= speedRope;
                        if (releaseType === 'ASCENT' && clawBase.position.y < releasePoint && targetAngle === ANGLE_CLOSE) { targetAngle = releaseStrength; updateUI("앗! 집게가 벌어집니다!"); playSound('fail'); }
                    } else gameState = 'RETURNING';
                    break;
                case 'RETURNING':
                    if (tx > 10) { tx -= speedX; playSound('move'); if (releaseType === 'TRAVEL' && tx < releasePoint && targetAngle === ANGLE_CLOSE) { targetAngle = releaseStrength; updateUI("거의 다 왔는데..!"); playSound('fail'); } }
                    else { tx = 100; gameState = 'RELEASING'; actionTimer = 0; targetAngle = ANGLE_OPEN; }
                    Body.setPosition(trolley, { x: tx, y: 30 });
                    break;
                case 'RELEASING':
                    actionTimer++;
                    toys.forEach(toy => { if (!toy.isCaught && toy.position.x < 165 && toy.position.y > 450) { toy.isCaught = true; caughtItems.push(toy.label); playSound('success'); } });
                    if (actionTimer > 120) { attempts++; if (attempts >= MAX_ATTEMPTS) { showResultModal(); } else gameState = 'RESETTING'; }
                    break;
                case 'RESETTING':
                    if (tx < 400) tx += speedX; else { tx = 400; gameState = 'IDLE'; btnDown.disabled = false; btnLeft.disabled = false; btnRight.disabled = false; updateUI("준비 완료!"); }
                    Body.setPosition(trolley, { x: tx, y: 30 });
                    break;
            }
        });

        Events.on(render, 'afterRender', function() {
            if (!trolley || !clawBase) return;
            const ctx = render.context;
            ctx.beginPath(); ctx.moveTo(trolley.position.x, 0); ctx.lineTo(clawBase.position.x, clawBase.position.y - 12);
            ctx.lineWidth = 3; ctx.strokeStyle = '#555'; ctx.stroke();
            ctx.lineWidth = 1; ctx.strokeStyle = '#ffeb3b'; ctx.stroke();
            ctx.fillStyle = "#ff4081";
            ctx.beginPath(); ctx.arc(clawBase.position.x - PIVOT_X, clawBase.position.y + PIVOT_Y, 1.5, 0, 7); ctx.fill();
            ctx.beginPath(); ctx.arc(clawBase.position.x + PIVOT_X, clawBase.position.y + PIVOT_Y, 1.5, 0, 7); ctx.fill();
            ctx.font = "bold 13px Pretendard"; ctx.textAlign = "center"; ctx.fillStyle = "#fff";
            toys.forEach(toy => { ctx.fillText(toy.label, toy.position.x, toy.position.y + 5); });
        });

        const moveLeft = (e) => { if(e.cancelable) e.preventDefault(); if(gameState === 'IDLE') { isMovingLeft = true; if(audioCtx.state==='suspended') audioCtx.resume(); }};
        const moveRight = (e) => { if(e.cancelable) e.preventDefault(); if(gameState === 'IDLE') { isMovingRight = true; if(audioCtx.state==='suspended') audioCtx.resume(); }};
        const stopMove = (e) => { if(e.cancelable) e.preventDefault(); isMovingLeft = false; isMovingRight = false; };
        const grabAction = (e) => { if(e.cancelable) e.preventDefault(); if(audioCtx.state==='suspended') audioCtx.resume(); if(gameState === 'IDLE') gameState = 'DROPPING'; else if (gameState === 'DROPPING') { gameState = 'GRABBING'; actionTimer = 0; targetAngle = ANGLE_CLOSE; btnDown.disabled = true; playSound('grab'); setReleaseLogic(clawBase.position.x); } };

        btnLeft.addEventListener('mousedown', moveLeft); btnLeft.addEventListener('touchstart', moveLeft, {passive:false});
        btnRight.addEventListener('mousedown', moveRight); btnRight.addEventListener('touchstart', moveRight, {passive:false});
        btnDown.addEventListener('mousedown', grabAction); btnDown.addEventListener('touchstart', grabAction, {passive:false});
        window.addEventListener('mouseup', stopMove); window.addEventListener('touchend', stopMove, {passive:false});

        initGame();
    </script>
</body>
</html>
