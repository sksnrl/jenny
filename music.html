<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H.Music Quiz Pro - Volume Control</title>
    <script src="https://unpkg.com/hangul-js"></script>
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --success: #10b981;
            --error: #f43f5e;
            --bg: #0f172a;
            --card: #1e293b;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg);
            color: #f1f5f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            width: 90%;
            max-width: 480px;
            background: var(--card);
            padding: 2rem;
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.7);
            text-align: center;
            position: relative;
        }

        /* Settings Style */
        .setting-card { background: #334155; padding: 20px; border-radius: 20px; margin-bottom: 20px; text-align: left; }
        label { display: block; margin-bottom: 8px; font-size: 0.9rem; color: #94a3b8; font-weight: 600; }
        select {
            width: 100%; padding: 12px; background: #1e293b; border: 1px solid #475569;
            border-radius: 12px; color: white; font-size: 1rem; cursor: pointer; outline: none;
        }

        /* Volume Slider Custom */
        .volume-container { display: flex; align-items: center; gap: 10px; }
        input[type="range"] {
            flex: 1; height: 6px; background: #1e293b; border-radius: 5px;
            appearance: none; cursor: pointer;
        }
        input[type="range"]::-webkit-slider-thumb {
            appearance: none; width: 16px; height: 16px; background: var(--secondary);
            border-radius: 50%; cursor: pointer; box-shadow: 0 0 5px rgba(0,0,0,0.5);
        }

        /* Game UI */
        #lobby { display: block; }
        #game { display: none; }
        
        .game-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; gap: 10px; }
        .current-info { font-size: 0.75rem; color: var(--secondary); background: rgba(168, 85, 247, 0.1); padding: 4px 10px; border-radius: 20px; white-space: nowrap; }
        
        .stage-indicator { display: flex; justify-content: space-between; margin-bottom: 15px; }
        .stage-dot { width: 23%; height: 5px; background: #334155; border-radius: 10px; transition: 0.3s; }
        .stage-dot.active { background: var(--primary); box-shadow: 0 0 10px var(--primary); }

        .hint-box {
            background: #0f172a; border: 1px solid #334155; border-radius: 24px;
            padding: 25px 15px; margin-bottom: 20px; min-height: 140px;
            display: flex; flex-direction: column; justify-content: center;
        }
        .hint-text { font-size: 1.3rem; font-weight: 700; margin: 10px 0; opacity: 0; transform: translateY(10px); transition: 0.4s; }
        .hint-text.visible { opacity: 1; transform: translateY(0); }

        .btn { border: none; border-radius: 16px; font-weight: 700; cursor: pointer; transition: 0.2s; width: 100%; margin-top: 10px; }
        .btn-main { padding: 16px; background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; font-size: 1.1rem; }
        .btn-sub { padding: 8px 12px; background: #334155; color: #cbd5e1; font-size: 0.8rem; width: auto; margin: 0; }
        .btn-audio { padding: 10px; background: #475569; font-size: 0.85rem; width: 48%; }
        .btn-submit { padding: 16px; background: var(--primary); color: white; margin-top: 20px; }
        .btn-submit:disabled { opacity: 0.2; }
        .btn-next { padding: 16px; background: var(--success); color: white; display: none; }

        .audio-group { display: none; justify-content: space-between; margin-top: 15px; }
        .audio-group.visible { display: flex; }

        input[type="text"] {
            width: 100%; padding: 16px; box-sizing: border-box; background: #0f172a;
            border: 2px solid #334155; border-radius: 16px; color: white; font-size: 1.1rem;
            text-align: center; outline: none;
        }
        input[type="text"]:focus { border-color: var(--primary); }

        #result-msg { margin-top: 20px; font-size: 1.2rem; font-weight: bold; }
        .loading-overlay { display: none; position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(30,41,59,0.9); border-radius:32px; justify-content:center; align-items:center; z-index:10; }
    </style>
</head>
<body>

<div class="container">
    <div id="loading" class="loading-overlay">⏳ 곡을 찾는 중...</div>

    <div id="lobby">
        <h1 style="margin: 0 0 10px 0; font-size: 2rem;">Music Quiz</h1>
        <p style="color:#94a3b8; margin-bottom: 25px;">설정을 완료하고 시작하세요</p>
        
        <div class="setting-card">
            <label>장르 (Genre)</label>
            <select id="genre-select">
                <option value="kpop">K-POP (종합)</option>
                <option value="pop">Global Pop</option>
                <option value="ost">OST (드라마/영화)</option>
                <option value="hiphop">Hip-Hop / R&B</option>
                <option value="rock">Rock / Metal</option>
                <option value="dance">Dance / Electronic</option>
                <option value="indie">Indie / Folk</option>
                <option value="trot">Trot (트로트)</option>
            </select>
        </div>

        <div class="setting-card">
            <label>출시 시기 (Year)</label>
            <select id="year-select">
                <option value="all">모든 시대</option>
                <option value="2020">2020년대</option>
                <option value="2010">2010년대</option>
                <option value="2000">2000년대</option>
                <option value="1990">1990년대</option>
            </select>
        </div>

        <div class="setting-card">
            <label>기본 볼륨 (Volume)</label>
            <div class="volume-container">
                <span style="font-size: 1.2rem;">🔈</span>
                <input type="range" id="lobby-volume" min="0" max="1" step="0.01" value="0.5" oninput="syncVolume(this.value)">
                <span style="font-size: 1.2rem;">🔊</span>
            </div>
        </div>

        <button class="btn btn-main" onclick="initGameFlow(true)">게임 시작하기</button>
    </div>

    <div id="game">
        <div class="game-header">
            <span id="display-info" class="current-info">K-POP | 전체</span>
            <div class="volume-container" style="flex: 1; max-width: 120px;">
                <input type="range" id="game-volume" min="0" max="1" step="0.01" value="0.5" oninput="syncVolume(this.value)">
            </div>
            <button class="btn btn-sub" onclick="goBackToLobby()">로비로</button>
        </div>

        <div class="stage-indicator">
            <div class="stage-dot active"></div>
            <div class="stage-dot"></div>
            <div class="stage-dot"></div>
            <div class="stage-dot"></div>
        </div>
        
        <div class="hint-box">
            <div id="hint-1" class="hint-text">1단계: 가수 정보</div>
            <div id="hint-2" class="hint-text" style="letter-spacing: 2px; color: #94a3b8; font-size: 1.1rem;">초성 힌트</div>
            <div id="audio-area" class="audio-group">
                <button class="btn btn-audio" onclick="playAudio(1500)">🔊 1.5초 듣기</button>
                <button id="btn-3s" class="btn btn-audio" onclick="playAudio(3000)" style="display:none;">🔊 3.0초 듣기</button>
            </div>
        </div>

        <button id="next-hint-btn" class="btn btn-sub" style="width:100%; padding:12px;" onclick="nextHint()">다음 힌트 확인</button>

        <div id="input-area" style="margin-top: 25px;">
            <input type="text" id="user-answer" placeholder="정답을 입력하세요 (기회 1번)">
            <button id="submit-btn" class="btn btn-submit" onclick="checkAnswer()">정답 제출</button>
        </div>

        <div id="result-msg"></div>
        <button id="next-song-btn" class="btn btn-next" onclick="initGameFlow(false)">다음 문제 도전</button>
    </div>

    <audio id="music-player"></audio>
</div>

<script>
    let currentSong = null;
    let stage = 1;
    let isFinished = false;
    const audioPlayer = document.getElementById('music-player');

    // 볼륨 동기화 함수
    function syncVolume(val) {
        audioPlayer.volume = val;
        document.getElementById('lobby-volume').value = val;
        document.getElementById('game-volume').value = val;
    }

    async function initGameFlow(isFirstStart) {
        const loading = document.getElementById('loading');
        loading.style.display = 'flex';
        
        if (isFirstStart) {
            document.getElementById('lobby').style.display = 'none';
            document.getElementById('game').style.display = 'block';
        }

        resetGameState();

        const genre = document.getElementById('genre-select').value;
        const yearVal = document.getElementById('year-select').value;
        
        const genreText = document.getElementById('genre-select').options[document.getElementById('genre-select').selectedIndex].text;
        document.getElementById('display-info').innerText = `${genreText}`;

        try {
            let query = genre === 'kpop' ? 'k-pop' : (genre === 'pop' ? 'pop' : (genre === 'ost' ? 'soundtrack' : genre));
            const response = await fetch(`https://itunes.apple.com/search?term=${query}&country=kr&entity=song&limit=200`);
            const data = await response.json();
            
            let pool = data.results.filter(s => {
                const y = new Date(s.releaseDate).getFullYear();
                if (yearVal === 'all') return true;
                return y >= parseInt(yearVal) && y < parseInt(yearVal) + 10;
            });

            if (pool.length === 0) {
                alert("해당 조건의 곡이 부족합니다!");
                goBackToLobby();
                return;
            }

            currentSong = pool[Math.floor(Math.random() * pool.length)];
            prepareGameContent();
        } catch (e) {
            alert("연결 오류가 발생했습니다.");
            goBackToLobby();
        } finally {
            loading.style.display = 'none';
        }
    }

    function prepareGameContent() {
        const year = new Date(currentSong.releaseDate).getFullYear();
        document.getElementById('hint-1').innerText = `${currentSong.artistName} (${year})`;
        document.getElementById('hint-1').classList.add('visible');

        const choseong = currentSong.trackName.split('').map(c => {
            if (Hangul.isHangul(c)) return Hangul.disassemble(c)[0];
            return (/[a-zA-Z0-9]/.test(c)) ? '_' : c;
        }).join('');
        document.getElementById('hint-2').innerText = choseong;

        audioPlayer.src = currentSong.previewUrl;
    }

    function nextHint() {
        if (stage >= 4) return;
        stage++;
        
        const dots = document.querySelectorAll('.stage-dot');
        dots[stage-1].classList.add('active');

        if (stage === 2) document.getElementById('hint-2').classList.add('visible');
        if (stage === 3) document.getElementById('audio-area').classList.add('visible');
        if (stage === 4) {
            document.getElementById('btn-3s').style.display = 'block';
            document.getElementById('next-hint-btn').style.display = 'none';
        }
    }

    function playAudio(ms) {
        audioPlayer.currentTime = 0;
        audioPlayer.play();
        setTimeout(() => { if(!isFinished) audioPlayer.pause(); }, ms);
    }

    function checkAnswer() {
        if (isFinished) return;
        isFinished = true;

        const userVal = document.getElementById('user-answer').value.replace(/\s/g, '').toLowerCase();
        const correctVal = currentSong.trackName.replace(/\s/g, '').toLowerCase();
        const resMsg = document.getElementById('result-msg');

        document.getElementById('user-answer').disabled = true;
        document.getElementById('submit-btn').disabled = true;
        document.getElementById('next-hint-btn').style.display = 'none';

        if (userVal === correctVal) {
            resMsg.innerHTML = `<span style="color:var(--success)">정답! 🎉</span>`;
        } else {
            resMsg.innerHTML = `<span style="color:var(--error)">오답입니다 😢</span>`;
        }

        revealFinalAnswer();
    }

    function revealFinalAnswer() {
        const resMsg = document.getElementById('result-msg');
        resMsg.innerHTML += `<div style="font-size:0.9rem; color:#94a3b8; margin-top:5px;">정답: ${currentSong.trackName}</div>`;
        
        document.getElementById('hint-2').innerText = currentSong.trackName;
        document.getElementById('hint-2').classList.add('visible');
        document.getElementById('hint-2').style.color = "var(--success)";

        audioPlayer.currentTime = 0;
        audioPlayer.play();

        document.getElementById('next-song-btn').style.display = 'block';
    }

    function resetGameState() {
        stage = 1;
        isFinished = false;
        document.getElementById('result-msg').innerHTML = "";
        document.getElementById('user-answer').value = "";
        document.getElementById('user-answer').disabled = false;
        document.getElementById('submit-btn').disabled = false;
        document.getElementById('next-song-btn').style.display = 'none';
        document.getElementById('next-hint-btn').style.display = 'block';
        document.getElementById('audio-area').classList.remove('visible');
        document.getElementById('btn-3s').style.display = 'none';
        document.getElementById('hint-2').style.color = "#94a3b8";
        
        document.querySelectorAll('.hint-text').forEach(t => t.classList.remove('visible'));
        document.querySelectorAll('.stage-dot').forEach((d, i) => {
            if(i === 0) d.classList.add('active');
            else d.classList.remove('active');
        });
    }

    function goBackToLobby() {
        audioPlayer.pause();
        document.getElementById('game').style.display = 'none';
        document.getElementById('lobby').style.display = 'block';
    }
</script>

</body>
</html>
