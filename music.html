<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JENNIE Music Quiz</title>
    <script src="https://unpkg.com/hangul-js"></script>
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --success: #10b981;
            --error: #f43f5e;
            --bg: #0f172a;
            --card: rgba(30, 41, 59, 0.8);
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
            color: #f1f5f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            width: 90%;
            max-width: 460px;
            background: var(--card);
            backdrop-filter: blur(15px);
            padding: 2.5rem;
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
            position: relative;
        }

        /* Lobby */
        .setting-card { background: rgba(51, 65, 85, 0.4); padding: 18px; border-radius: 20px; margin-bottom: 15px; text-align: left; }
        label { display: block; margin-bottom: 8px; font-size: 0.85rem; color: #94a3b8; font-weight: 600; }
        select {
            width: 100%; padding: 12px; background: #1e293b; border: 1px solid #475569;
            border-radius: 12px; color: white; font-size: 1rem; outline: none;
        }

        /* Volume */
        .volume-container { display: flex; align-items: center; gap: 10px; }
        input[type="range"] { flex: 1; height: 5px; appearance: none; background: #1e293b; border-radius: 5px; cursor: pointer; }
        input[type="range"]::-webkit-slider-thumb { appearance: none; width: 14px; height: 14px; background: var(--secondary); border-radius: 50%; }

        #lobby { display: block; }
        #game { display: none; }
        
        .game-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .current-info { font-size: 0.75rem; color: var(--secondary); background: rgba(168, 85, 247, 0.1); padding: 4px 12px; border-radius: 20px; }
        
        /* 4단계 인디케이터 */
        .stage-indicator { display: flex; justify-content: space-between; margin-bottom: 20px; }
        .stage-dot { width: 23%; height: 5px; background: #334155; border-radius: 10px; transition: 0.3s; }
        .stage-dot.active { background: var(--primary); box-shadow: 0 0 10px var(--primary); }

        .hint-box {
            background: rgba(15, 23, 42, 0.5); border: 1px solid rgba(255,255,255,0.05); border-radius: 24px;
            padding: 25px 15px; margin-bottom: 25px; min-height: 150px;
            display: flex; flex-direction: column; justify-content: center;
        }
        .hint-text { font-size: 1.3rem; font-weight: 700; margin: 10px 0; opacity: 0; transform: translateY(10px); transition: 0.4s; }
        .hint-text.visible { opacity: 1; transform: translateY(0); }

        .btn { border: none; border-radius: 16px; font-weight: 700; cursor: pointer; transition: 0.2s; width: 100%; margin-top: 10px; }
        .btn-main { padding: 16px; background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; font-size: 1.1rem; }
        .btn-sub { padding: 8px 12px; background: #334155; color: #cbd5e1; font-size: 0.8rem; width: auto; margin: 0; }
        .btn-audio { padding: 10px; background: #475569; font-size: 0.8rem; width: 31%; color: white; display: none; border: 1px solid rgba(255,255,255,0.1); }
        .btn-audio.active { display: inline-block; }
        .btn-submit { padding: 16px; background: var(--primary); color: white; margin-top: 20px; }
        .btn-submit:disabled { opacity: 0.2; }
        .btn-next { padding: 16px; background: var(--success); color: white; display: none; }

        .audio-group { display: flex; justify-content: space-between; margin-top: 20px; gap: 5px; }

        input[type="text"] {
            width: 100%; padding: 16px; box-sizing: border-box; background: #0f172a;
            border: 2px solid #334155; border-radius: 16px; color: white; font-size: 1.1rem;
            text-align: center; outline: none;
        }
        input[type="text"]:focus { border-color: var(--primary); }

        #result-msg { margin-top: 20px; font-size: 1.1rem; font-weight: bold; }
        .loading-overlay { display: none; position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(15,23,42,0.95); border-radius:32px; justify-content:center; align-items:center; z-index:100; }
    </style>
</head>
<body>

<div class="container">
    <div id="loading" class="loading-overlay">⏳ 선곡중...</div>

    <div id="lobby">
        <h1 style="margin: 0 0 10px 0; font-size: 1.8rem; letter-spacing: -1px;">JENNIE Music Quiz</h1>
        <div class="setting-card">
            <label>음악 범위 (Region)</label>
            <select id="region-select">
                <option value="global">GLOBAL HIT</option>
                <option value="kr">K-POP (대한민국)</option>
                <option value="us">US/UK Pop</option>
                <option value="jp">J-POP (일본)</option>
            </select>
        </div>
        <div class="setting-card">
            <label>연도 (Year)</label>
            <select id="year-select">
                <option value="">전체 시대</option>
                <option value="2020">2020년대</option>
                <option value="2010">2010년대</option>
                <option value="2000">2000년대</option>
                <option value="1990">1990년대</option>
            </select>
        </div>
        <div class="setting-card">
            <label>볼륨 조절</label>
            <div class="volume-container">
                <input type="range" id="lobby-volume" min="0" max="1" step="0.01" value="0.5" oninput="syncVolume(this.value)">
            </div>
        </div>
        <button class="btn btn-main" onclick="initGameFlow(true)">게임 시작</button>
    </div>

    <div id="game">
        <div class="game-header">
            <span id="display-info" class="current-info">Music</span>
            <input type="range" id="game-volume" style="width: 70px;" min="0" max="1" step="0.01" value="0.5" oninput="syncVolume(this.value)">
            <button class="btn btn-sub" onclick="goBackToLobby()">로비</button>
        </div>
        <div class="stage-indicator">
            <div class="stage-dot active"></div><div class="stage-dot"></div><div class="stage-dot"></div><div class="stage-dot"></div>
        </div>
        
        <div class="hint-box">
            <div id="hint-1" class="hint-text">1단계: 가수 정보</div>
            <div id="hint-2" class="hint-text" style="letter-spacing: 2px; color: #94a3b8;">제목 힌트</div>
            <div class="audio-group">
                <button id="btn-1s" class="btn btn-audio active" onclick="playAudio(1000)">🔊 1초</button>
                <button id="btn-2s" class="btn btn-audio" onclick="playAudio(2000)">🔊 2초</button>
                <button id="btn-3s" class="btn btn-audio" onclick="playAudio(3000)">🔊 3초</button>
            </div>
        </div>

        <button id="next-hint-btn" class="btn btn-sub" style="width:100%; margin-bottom: 10px;" onclick="nextHint()">다음 힌트 열기</button>

        <div>
            <input type="text" id="user-answer" placeholder="정답을 입력하세요">
            <button id="submit-btn" class="btn btn-submit" onclick="checkAnswer()">정답 제출</button>
        </div>
        <div id="result-msg"></div>
        <button id="next-song-btn" class="btn btn-next" onclick="initGameFlow(false)">다음 문제</button>
    </div>
    <audio id="music-player"></audio>
</div>

<script>
    let songPool = [];
    let playedSongIds = new Set();
    let currentSong = null;
    let stage = 1;
    let isFinished = false;
    const audioPlayer = document.getElementById('music-player');

    function syncVolume(val) {
        audioPlayer.volume = val;
        document.getElementById('lobby-volume').value = val;
        document.getElementById('game-volume').value = val;
    }

    async function initGameFlow(isNewSetting) {
        const loading = document.getElementById('loading');
        loading.style.display = 'flex';
        
        if (isNewSetting) {
            document.getElementById('lobby').style.display = 'none';
            document.getElementById('game').style.display = 'block';
            playedSongIds.clear();
            songPool = [];
        }

        resetGameState();

        if (songPool.length === 0) {
            const region = document.getElementById('region-select').value;
            const year = document.getElementById('year-select').value;
            let query = (region === 'kr' ? 'kpop' : (region === 'us' ? 'pop' : (region === 'jp' ? 'jpop' : 'hits'))) + ' ' + year;
            let countryParam = (region === 'global' || region === 'us') ? 'us' : region;

            try {
                const response = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(query)}&country=${countryParam}&entity=song&limit=200`);
                const data = await response.json();
                songPool = data.results.sort(() => Math.random() - 0.5); 
            } catch (e) {
                alert("연결 오류");
                goBackToLobby();
            }
        }

        currentSong = songPool.find(s => !playedSongIds.has(s.trackId));
        if (!currentSong) {
            playedSongIds.clear();
            currentSong = songPool[0];
        }

        playedSongIds.add(currentSong.trackId);
        prepareGameContent();
        loading.style.display = 'none';
    }

    function prepareGameContent() {
        const year = new Date(currentSong.releaseDate).getFullYear();
        document.getElementById('display-info').innerText = currentSong.primaryGenreName;
        
        // 1단계 내용
        document.getElementById('hint-1').innerText = `${currentSong.artistName} (${year})`;
        document.getElementById('hint-1').classList.add('visible');
        
        // 제목 힌트 (한글 초성 / 영문&일문 30% 확률)
        const displayHint = currentSong.trackName.split('').map(c => {
            if (Hangul.isHangul(c)) return Hangul.disassemble(c)[0];
            const isEngJap = /[a-zA-Z\u3040-\u30ff\u3400-\u4dbf\u4e00-\u9fff]/.test(c);
            if (isEngJap) return Math.random() < 0.3 ? c : '_';
            return c;
        }).join('');
        document.getElementById('hint-2').innerText = displayHint;
        
        audioPlayer.src = currentSong.previewUrl;
    }

    function nextHint() {
        if (stage >= 4) return;
        stage++;
        
        const dots = document.querySelectorAll('.stage-dot');
        dots[stage-1].classList.add('active');

        if (stage === 2) {
            document.getElementById('hint-2').classList.add('visible');
        } else if (stage === 3) {
            document.getElementById('btn-2s').classList.add('active');
        } else if (stage === 4) {
            document.getElementById('btn-3s').classList.add('active');
            document.getElementById('next-hint-btn').style.display = 'none';
        }
    }

    function playAudio(ms) {
        audioPlayer.currentTime = 0;
        audioPlayer.play();
        setTimeout(() => { if(!isFinished) audioPlayer.pause(); }, ms);
    }

    function checkAnswer() {
        if (isFinished) return;
        isFinished = true;

        const userVal = document.getElementById('user-answer').value.replace(/\s/g, '').toLowerCase();
        const correctVal = currentSong.trackName.replace(/\s/g, '').toLowerCase();
        
        document.getElementById('user-answer').disabled = true;
        document.getElementById('submit-btn').disabled = true;
        document.getElementById('next-hint-btn').style.display = 'none';
        
        const isCorrect = userVal === correctVal;
        document.getElementById('result-msg').innerHTML = isCorrect ? `<span style="color:var(--success)">정답! 🎉</span>` : `<span style="color:var(--error)">오답 😢 (정답: ${currentSong.trackName})</span>`;
        
        document.getElementById('hint-2').innerText = currentSong.trackName;
        document.getElementById('hint-2').classList.add('visible');
        document.getElementById('hint-2').style.color = "var(--success)";
        
        audioPlayer.currentTime = 0;
        audioPlayer.play();
        document.getElementById('next-song-btn').style.display = 'block';
    }

    function resetGameState() {
        stage = 1; isFinished = false;
        document.getElementById('result-msg').innerHTML = "";
        document.getElementById('user-answer').value = "";
        document.getElementById('user-answer').disabled = false;
        document.getElementById('submit-btn').disabled = false;
        document.getElementById('next-song-btn').style.display = 'none';
        document.getElementById('next-hint-btn').style.display = 'block';
        
        document.querySelectorAll('.btn-audio').forEach((btn, i) => {
            if(i === 0) btn.classList.add('active');
            else btn.classList.remove('active');
        });
        document.querySelectorAll('.hint-text').forEach(t => t.classList.remove('visible'));
        document.querySelectorAll('.stage-dot').forEach((d, i) => i === 0 ? d.classList.add('active') : d.classList.remove('active'));
    }

    function goBackToLobby() {
        audioPlayer.pause();
        document.getElementById('game').style.display = 'none';
        document.getElementById('lobby').style.display = 'block';
    }
</script>

</body>
</html>
